<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Historial de Consumo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

  <div class="topbar">
    <h1>Historial de Consumo</h1>
    <button id="theme-toggle" class="theme-btn">🌙</button>
  </div>

  <div class="historial-nav">
    <a href="index.html" class="btn-volver">← Volver al inicio</a>
  </div>

  <div class="card">
    <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; align-items: center; margin-bottom: 15px;">
      <div>
        <label>Desde:</label>
        <input type="datetime-local" id="fechaInicio">
      </div>
      <div>
        <label>Hasta:</label>
        <input type="datetime-local" id="fechaFin">
      </div>
      <button onclick="filtrar()">Filtrar</button>
      <button onclick="descargarCSV()">⬇ Descargar CSV</button>
    </div>
    <canvas id="graficaHistorial"></canvas>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="tema.js"></script>
<script src="historial.js"></script>

</body>
</html>
