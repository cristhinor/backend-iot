<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel IoT Profesional</title>

  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

  <div class="topbar">
    <h1>Panel IoT - Control de Consumo</h1>
    <button id="theme-toggle" class="theme-btn">🌙</button>
  </div>

  <!-- Botón hamburguesa -->
  <button class="hamburger" onclick="toggleMenu()">☰</button>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">Menú</div>
    <a href="historial.html" class="sidebar-item">📊 Historial</a>
  </div>

  <!-- Overlay -->
  <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

  <div class="conexion">
  <span id="estadoConexionTexto">Desconectado</span>
  <div id="indicadorConexion" class="punto rojo"></div>
  </div>

  <div class="card">
    <h2>Consumo en Tiempo Real</h2>
    <canvas id="graficaConsumo"></canvas>
  </div>

  <div class="card control">
    <h2>Control LED</h2>

    <div id="toggleBtn" onclick="toggleLED()" class="toggle-btn">
    Encender / Apagar
    </div>

    <div class="led-indicador" id="ledIndicador"></div>
    <p id="estadoTexto">Estado desconocido</p>
  </div>


</div>

<script src="script.js"></script>

<script>
function toggleMenu() {
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("show");
}
</script>

</body>
</html>
