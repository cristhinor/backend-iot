<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar sesión - IoT</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .login-container {
      max-width: 400px;
      margin: 100px auto;
    }

    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 15px;
      padding: 40px;
      box-shadow: 0 4px 20px var(--shadow-color);
    }

    .login-card h1 {
      margin-bottom: 30px;
      font-size: 24px;
    }

    .login-field {
      margin-bottom: 20px;
      text-align: left;
    }

    .login-field label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: bold;
    }

    .login-field input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 15px;
      box-sizing: border-box;
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-login:hover { opacity: 0.85; }

    .login-error {
      color: #e74c3c;
      font-size: 14px;
      margin-top: 15px;
      display: none;
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <h1>🔐 Iniciar sesión</h1>

    <div class="login-field">
      <label>Email</label>
      <input type="email" id="email" placeholder="tu@email.com"/>
    </div>

    <div class="login-field">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••"/>
    </div>

    <button class="btn-login" onclick="login()">Entrar</button>
    <p class="login-error" id="loginError">Credenciales incorrectas</p>
  </div>
</div>

<script src="tema.js"></script>
<script>
async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const errorEl = document.getElementById("loginError");

  errorEl.style.display = "none";

  try {
    const res = await fetch("https://backend-iot-mb58.onrender.com/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      errorEl.style.display = "block";
      errorEl.innerText = data.error || "Credenciales incorrectas";
      return;
    }

    // Guardar sesión
    sessionStorage.setItem("token", data.token);
    sessionStorage.setItem("nombre", data.nombre);
    sessionStorage.setItem("rol", data.rol);

    // Redirigir según rol
    if (data.rol === "conductor") {
      window.location.href = "mapa.html";
    } else {
      window.location.href = "index.html";
    }

  } catch (error) {
    errorEl.style.display = "block";
    errorEl.innerText = "Error de conexión";
  }
}

// Permitir Enter para login
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("password").addEventListener("keydown", (e) => {
    if (e.key === "Enter") login();
  });
});
</script>

</body>
</html>
