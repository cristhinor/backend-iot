<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ContrAll - Iniciar sesión</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background-image: url('fondo_login.jpg');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }

    .login-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .login-title {
      color: white;
      font-size: 36px;
      font-weight: bold;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
      letter-spacing: 2px;
    }

    .login-subtitle {
      color: rgba(255,255,255,0.85);
      font-size: 15px;
      text-shadow: 0 1px 6px rgba(0,0,0,0.4);
      margin-top: -15px;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 20px;
      padding: 40px 35px;
      width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .login-field {
      margin-bottom: 18px;
      position: relative;
    }

    .login-field input {
      width: 100%;
      padding: 13px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.2);
      color: white;
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
    }

    .login-field input::placeholder {
      color: rgba(255,255,255,0.7);
    }

    .login-field input:focus {
      border-color: rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.25);
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: rgba(255,255,255,0.25);
      color: white;
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 1px;
    }

    .btn-login:hover {
      background: rgba(255,255,255,0.35);
      transform: translateY(-1px);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .login-error {
      color: #ff6b6b;
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
      display: none;
    }

    .login-have-account {
      color: rgba(255,255,255,0.85);
      font-size: 14px;
      text-align: center;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<div class="login-wrapper">
  <div class="login-title">ContrAll</div>
  <p class="login-subtitle">Sistema de monitoreo IoT</p>

  <div class="login-card">
    <p class="login-have-account">Inicia sesión con tu cuenta</p>

    <div class="login-field">
      <input type="email" id="email" placeholder="Correo electrónico"/>
    </div>

    <div class="login-field">
      <input type="password" id="password" placeholder="Contraseña"/>
    </div>

    <button class="btn-login" onclick="login()">SIGN IN</button>
    <p class="login-error" id="loginError">Credenciales incorrectas</p>
  </div>
</div>

<script src="auth.js"></script>
<script>
async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const errorEl = document.getElementById("loginError");

  errorEl.style.display = "none";

  if (!email || !password) {
    errorEl.style.display = "block";
    errorEl.innerText = "Completa todos los campos";
    return;
  }

  try {
    const res = await fetch("https://backend-iot-mb58.onrender.com/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      errorEl.style.display = "block";
      errorEl.innerText = data.error || "Credenciales incorrectas";
      return;
    }

    sessionStorage.setItem("token", data.token);
    sessionStorage.setItem("nombre", data.nombre);
    sessionStorage.setItem("rol", data.rol);

    if (data.rol === "conductor") {
      window.location.href = "mapa.html";
    } else {
      window.location.href = "index.html";
    }

  } catch (error) {
    errorEl.style.display = "block";
    errorEl.innerText = "Error de conexión";
  }
}

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("password").addEventListener("keydown", (e) => {
    if (e.key === "Enter") login();
  });
});
</script>

</body>
</html>
